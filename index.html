<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Notes Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="open-menu" onclick="toggleMenu()">☰</button>

<div id="sidebar" class="sidebar">
  <button class="close-btn" onclick="toggleMenu()">✖</button>

  <h3>Menu</h3>
  <p onclick="showPage('rolePage')">Home</p>
  <p onclick="showPage('studentLogin')">Student</p>
  <p onclick="showPage('adminLogin')">Admin</p>
  <p onclick="showPage('notesPage')">Notes</p>
</div>

<!-- HOME -->
<div id="rolePage" class="page active">

  <img class="logo"
  src="https://www.gitamw.ac.in/media/logo/Gouthami_Auto4-1_DvzJqKN.png">

  <h1>Campus Notes Hub</h1>

  <p id="sloganText" class="slogan"></p>

  <button onclick="showPage('studentLogin')">Student Login</button>
  <button onclick="showPage('adminLogin')">Admin Login</button>

</div>

<!-- STUDENT -->
<div id="studentLogin" class="page">
  <h2>Student Login</h2>
  <input placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="showPage('notesPage')">Login</button>
</div>

<!-- ADMIN -->
<div id="adminLogin" class="page">
  <h2>Admin Login</h2>
  <input placeholder="Email">
  <input type="password">
  <button onclick="showPage('rolePage')">Login</button>
</div>

<!-- NOTES -->
<div id="notesPage" class="page">
  <h2>Notes</h2>

  <div class="card">DBMS Unit 1</div>
  <div class="card">OS Unit 2</div>

  <button onclick="showPage('rolePage')">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
